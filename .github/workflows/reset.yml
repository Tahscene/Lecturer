name: 🧹 One-Time Reset Jobs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run reset script
        run: python reset_jobs.py

      - name: Commit reset file
        run: |
          git config --global user.name "Job Tracker Bot"
          git config --global user.email "bot@noreply.github.com"

          git add docs/jobs.json
          git commit -m "🧹 one-time reset jobs.json" || echo "No changes"
          git push
