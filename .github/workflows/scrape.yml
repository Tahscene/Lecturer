name: 🎓 BD Lecturer Job Tracker

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:         # manual trigger anytime

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🔍 Run scraper (with verbose output)
        run: python scraper.py
        # If scraper fails, still continue to notify/build

      - name: 📬 Send Telegram notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notifier.py

      - name: 🌐 Build dashboard
        run: python build_dashboard.py

      - name: 💾 Commit updated data & dashboard
        run: |
          git config --global user.name  "Job Tracker Bot"
          git config --global user.email "bot@noreply.github.com"
          git add docs/ new_jobs.json || true
          git diff --staged --quiet || \
            git commit -m "🤖 Auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"
