name: 🎓 BD Lecturer Job Tracker

on:
  schedule:
    # Runs every 3 hours
    - cron: "0 */3 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Run scraper
        run: python scraper.py

      - name: 📬 Send Telegram notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notifier.py

      - name: 🌐 Build dashboard HTML
        run: python build_dashboard.py

      - name: 💾 Commit updated data & dashboard
        run: |
          git config --global user.name "Job Tracker Bot"
          git config --global user.email "bot@noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🤖 Auto-update jobs $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
